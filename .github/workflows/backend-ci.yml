name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:   [backend/**]
  pull_request:
    branches: [main]
    paths:   [backend/**]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        working-directory: backend
        run: mvn test -q

      - name: Build JAR
        working-directory: backend
        run: mvn package -DskipTests -q

      - name: Build Docker image
        working-directory: backend
        run: docker build -t skyfreight-backend:${{ github.sha }} .
