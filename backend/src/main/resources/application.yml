spring:
  application:
    name: skyfreight-portal-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skyfreight_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:skyfreight}
    password: ${DB_PASSWORD:skyfreight123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@skyfreight.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1
  error:
    include-message: never
    include-binding-errors: never

skyfreight:
  jwt:
    secret: ${JWT_SECRET:c2t5ZnJlaWdodC1wb3J0YWwtc3VwZXItc2VjcmV0LWtleS1mb3ItaW50ZXJ2aWV3LWRlbW8tMjAyNg==}
    access-token-expiry-ms: 900000        # 15 minutes
    refresh-token-expiry-ms: 604800000    # 7 days
  app:
    name: SkyFreight Portal
    base-url: ${APP_BASE_URL:http://localhost:5173}
    support-email: support@skyfreight.com

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized
